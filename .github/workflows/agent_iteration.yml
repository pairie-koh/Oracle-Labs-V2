name: Agent Iteration

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * *'

permissions:
  contents: write

jobs:
  iterate:
    runs-on: ubuntu-latest

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTERAPIKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy pandas scikit-learn

      - name: Create directories
        run: mkdir -p logs status llm_iteration_log

      - name: Iterate all agents
        run: python scripts/iterate_agent.py all

      - name: Iterate LLM forecaster
        run: python scripts/iterate_llm.py || echo "WARN LLM iteration skipped (not enough data yet)"

      - name: Commit iteration results
        run: |
          git config user.name "Oracle Lab Bot"
          git config user.email "hello.pairie@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "iteration: $(date +%Y-%m-%d)"
          git push
