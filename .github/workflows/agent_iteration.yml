name: Agent Iteration

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

permissions:
  contents: write

jobs:
  iterate:
    runs-on: ubuntu-latest

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTERAPIKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy pandas scikit-learn

      - name: Create directories
        run: mkdir -p logs status llm_iteration_log

      - name: Iterate all agents
        run: python scripts/iterate_agent.py all

      - name: Iterate LLM forecaster
        run: python scripts/iterate_llm.py || echo "WARN LLM iteration skipped (not enough data yet)"

      - name: Commit iteration results
        run: |
          git config user.name "Oracle Lab Bot"
          git config user.email "hello.pairie@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "iteration: $(date +%Y-%m-%d)"
          git push

      - name: Push to dashboard
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/pairie-koh/Trading-Agents-on-Polymarket.git /tmp/dashboard
          mkdir -p /tmp/dashboard/data
          # Collect all iteration logs into a single JSON for the dashboard
          python3 -c "
          import json, os, glob
          logs = sorted(glob.glob('llm_iteration_log/*.md'))
          entries = []
          for path in logs:
              date = os.path.basename(path).replace('.md', '')
              with open(path) as f:
                  content = f.read()
              entries.append({'date': date, 'content': content})
          with open('/tmp/dashboard/data/iteration_log.json', 'w') as f:
              json.dump({'entries': entries}, f, indent=2)
          print(f'Wrote {len(entries)} iteration log entries')
          "
          cd /tmp/dashboard
          git config user.name "Oracle Lab Bot"
          git config user.email "hello.pairie@gmail.com"
          git add data/
          git diff --cached --quiet || (git commit -m "iteration: $(date +%Y-%m-%d)" && git push)
