name: Forecast Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '5 */4 * * *'

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPICAPIKEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTERAPIKEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITYAPIKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy pandas scikit-learn matplotlib

      - name: Create directories
        run: mkdir -p logs reports status briefings llm_predictions contracts state scoreboard price_history fact_history agents/momentum/log agents/historian/log agents/game_theorist/log agents/quant/log

      - name: Newswire
        run: python newswire.py || echo "WARN newswire failed"

      - name: State
        run: python state.py || echo "WARN state failed"

      - name: Prepare briefing
        run: python prepare.py

      - name: Rolling contracts
        run: python rolling_contracts.py || echo "WARN rolling contracts failed"

      - name: Hyperliquid
        run: python hyperliquid.py || echo "WARN hyperliquid failed"

      - name: Weather
        run: python weather.py || echo "WARN weather failed"

      - name: GDELT
        run: python gdelt.py --timespan 2d || echo "WARN gdelt failed"

      - name: LLM forecast
        run: python llm_forecast.py

      - name: Agent forecasts
        run: |
          for agent in momentum historian game_theorist quant; do
            python "agents/$agent/forecast.py" briefings/latest.json || echo "WARN $agent failed"
          done

      - name: Evaluate
        run: |
          python evaluate.py || echo "WARN evaluation failed"
          python evaluate_rolling.py || echo "WARN rolling evaluation failed"

      - name: Report
        run: python report.py || echo "WARN report failed"

      - name: Status
        run: |
          python scripts/generate_status.py || echo "WARN status failed"
          if [ -f scores_history.csv ]; then
            python scripts/plot_progress.py && cp progress.png status/progress.png 2>/dev/null || true
          fi

      - name: Commit results
        run: |
          git config user.name "Oracle Lab Bot"
          git config user.email "hello.pairie@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "cycle: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase || true
          git push

      - name: Push to dashboard
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/pairie-koh/Trading-Agents-on-Polymarket.git /tmp/dashboard
          mkdir -p /tmp/dashboard/data
          cp contracts/active_contracts.json /tmp/dashboard/data/active_contracts.json 2>/dev/null || true
          cp briefings/latest.json /tmp/dashboard/data/briefing.json 2>/dev/null || true
          cp state/current.json /tmp/dashboard/data/state.json 2>/dev/null || true
          cp rolling_scores_history.csv /tmp/dashboard/data/rolling_scores.csv 2>/dev/null || true
          cp scoreboard/latest.json /tmp/dashboard/data/scoreboard.json 2>/dev/null || true
          cp scores_history.csv /tmp/dashboard/data/scores_history.csv 2>/dev/null || true
          LATEST_PRED=$(ls -t llm_predictions/predictions_*.json 2>/dev/null | head -1)
          if [ -n "$LATEST_PRED" ]; then
            cp "$LATEST_PRED" /tmp/dashboard/data/llm_predictions.json
          fi
          cd /tmp/dashboard
          git config user.name "Oracle Lab Bot"
          git config user.email "hello.pairie@gmail.com"
          git add data/
          git diff --cached --quiet || (git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
