name: Forecast Cycle

on:
  workflow_dispatch:
  schedule:
    - cron: '5 */4 * * *'

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPICAPIKEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTERAPIKEY }}
      PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITYAPIKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy pandas scikit-learn matplotlib

      - name: Create directories
        run: mkdir -p logs reports status briefings llm_predictions contracts state scoreboard price_history fact_history agents/momentum/log agents/historian/log agents/game_theorist/log agents/quant/log

      - name: Newswire
        run: python newswire.py || echo "WARN newswire failed"

      - name: State
        run: python state.py || echo "WARN state failed"

      - name: Prepare briefing
        run: python prepare.py

      - name: Rolling contracts
        run: python rolling_contracts.py || echo "WARN rolling contracts failed"

      - name: Hyperliquid
        run: python hyperliquid.py || echo "WARN hyperliquid failed"

      - name: GDELT
        run: python gdelt.py --timespan 2d || echo "WARN gdelt failed"

      - name: LLM forecast
        run: python llm_forecast.py

      - name: Agent forecasts
        run: |
          for agent in momentum historian game_theorist quant; do
            python "agents/$agent/forecast.py" briefings/latest.json || echo "WARN $agent failed"
          done

      - name: Evaluate
        run: |
          python evaluate.py || echo "WARN evaluation failed"
          python evaluate_rolling.py || echo "WARN rolling evaluation failed"

      - name: Report
        run: python report.py || echo "WARN report failed"

      - name: Status
        run: |
          python scripts/generate_status.py || echo "WARN status failed"
          if [ -f scores_history.csv ]; then
            python scripts/plot_progress.py && cp progress.png status/progress.png 2>/dev/null || true
          fi

      - name: Commit results
        run: |
          git config user.name "Oracle Lab Bot"
          git config user.email "hello.pairie@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "cycle: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
